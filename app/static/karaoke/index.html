<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#a51c30">
  <title>HR91 Human Karaoke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700&display=swap">
  <link rel="stylesheet" href="/karaoke/styles.css">
</head>
<body>
  <div class="top-bar">
    <header class="app-header">HR91 Human Karaoke</header>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="songs" role="tab">Songs</button>
      <button class="tab" data-tab="votes" role="tab">Votes</button>
      <button class="tab" data-tab="lyrics" role="tab">Lyrics</button>
    </nav>
  </div>

  <main>
    <section class="pane active" id="pane-songs">
      <div class="search-wrap">
        <div class="search-input">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true"><path d="M232.49,215.51,185,168a92.12,92.12,0,1,0-17,17l47.53,47.54a12,12,0,0,0,17-17ZM44,112a68,68,0,1,1,68,68A68.07,68.07,0,0,1,44,112Z"></path></svg>
          <input id="search" type="search" placeholder="Search artist or song" autocomplete="off">
        </div>
      </div>
      <ul class="song-list" id="song-list"></ul>
      <div class="empty" id="songs-empty" hidden>No songs yet. Ask the host to upload a setlist.</div>
    </section>

    <section class="pane" id="pane-votes">
      <ul class="vote-list" id="vote-list"></ul>
      <div class="empty" id="votes-empty">No votes yet.</div>
    </section>

    <section class="pane" id="pane-lyrics">
      <div id="lyrics-meta" class="lyrics-meta"></div>
      <pre id="lyrics-body" class="lyrics-body"></pre>
      <div class="empty" id="lyrics-empty">No song selected yet.</div>
    </section>
  </main>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/karaoke/app.js"></script>
</body>
</html>
